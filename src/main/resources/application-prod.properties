# 生產環境（Docker / VPS）
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# LINE Login（純 OAuth2）
spring.security.oauth2.client.registration.line.client-id=${LINE_CLIENT_ID}
spring.security.oauth2.client.registration.line.client-secret=${LINE_CLIENT_SECRET}
spring.security.oauth2.client.registration.line.scope=profile
spring.security.oauth2.client.registration.line.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.line.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.line.client-name=LINE
spring.security.oauth2.client.registration.line.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.line.authorization-uri=https://access.line.me/oauth2/v2.1/authorize
spring.security.oauth2.client.provider.line.token-uri=https://api.line.me/oauth2/v2.1/token
spring.security.oauth2.client.provider.line.user-info-uri=https://api.line.me/v2/profile
spring.security.oauth2.client.provider.line.user-name-attribute=userId

# GitHub Login
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# X (Twitter) Login（PKCE）
spring.security.oauth2.client.registration.x.client-id=${X_CLIENT_ID}
spring.security.oauth2.client.registration.x.client-secret=${X_CLIENT_SECRET}
spring.security.oauth2.client.registration.x.scope=tweet.read,users.read,offline.access
spring.security.oauth2.client.registration.x.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.x.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.x.client-name=X
spring.security.oauth2.client.registration.x.client-authentication-method=client_secret_basic

spring.security.oauth2.client.provider.x.authorization-uri=https://twitter.com/i/oauth2/authorize
spring.security.oauth2.client.provider.x.token-uri=https://api.x.com/2/oauth2/token
spring.security.oauth2.client.provider.x.user-info-uri=https://api.x.com/2/users/me
spring.security.oauth2.client.provider.x.user-name-attribute=data

# SMTP（Resend）
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Email 寄件人 + 驗證信連結
app.mail.from=BibleQuiz <noreply@biblequiz.cc>
app.base-url=${APP_BASE_URL:https://biblequiz.cc}
